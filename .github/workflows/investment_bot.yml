name: Investment Bond Agent

on:
  workflow_dispatch:
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: write
  actions: write

jobs:
  run-agent:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Restore runtime config from Secrets and Variables
        env:
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
          STRATEGY_JSON: ${{ secrets.STRATEGY_JSON }}
          STATE_JSON: ${{ vars.STATE_JSON }}
        run: |
          mkdir -p data
          
          if [ -n "$PORTFOLIO_JSON" ]; then
            printf '%s\n' "$PORTFOLIO_JSON" > data/portfolio.json
          fi

          if [ -n "$STRATEGY_JSON" ]; then
            printf '%s\n' "$STRATEGY_JSON" > data/strategy.json
          fi

          if [ -n "$STATE_JSON" ]; then
            printf '%s\n' "$STATE_JSON" > state.json
          fi

      - name: Run investment bot
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
        run: npm run start

      - name: Persist updated state to repository variable
        if: hashFiles('state.json') != ''
        env:
          GH_TOKEN: ${{ secrets.VARIABLES_PAT }}
        run: gh variable set STATE_JSON --body "$(cat state.json)"

      - name: Upload runtime state artifact
        if: hashFiles('state.json') != ''
        uses: actions/upload-artifact@v4
        with:
          name: runtime-state
          path: state.json
          if-no-files-found: ignore
