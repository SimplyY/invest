name: Investment Bond Agent

on:
  workflow_dispatch:
    inputs:
      send_notification:
        description: "Send the result to Feishu"
        type: boolean
        default: false
      force_trigger:
        description: "Include the strategy alert even if the band did not change"
        type: boolean
        default: false
  schedule:
    - cron: "30 1 * * *"

permissions:
  contents: read

concurrency:
  group: investment-bond-agent
  cancel-in-progress: false

jobs:
  run-agent:
    if: github.event_name == 'workflow_dispatch' || vars.NOTIFICATIONS_ENABLED == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Check code
        run: npm run check && npm test

      - name: Run investment bot
        env:
          FEISHU_WEBHOOK_URL: ${{ secrets.FEISHU_WEBHOOK_URL }}
          PORTFOLIO_JSON: ${{ secrets.PORTFOLIO_JSON }}
          STRATEGY_JSON: ${{ secrets.STRATEGY_JSON }}
          STATE_JSON: ${{ vars.STATE_JSON }}
          FORCE_TRIGGER: ${{ inputs.force_trigger && '1' || '' }}
        run: |
          if [[ "${{ github.event_name }}" == "schedule" || "${{ inputs.send_notification }}" == "true" ]]; then
            npm run notify
          else
            npm start
          fi

      - name: Persist updated state to repository variable
        if: success() && hashFiles('state.json') != '' && (github.event_name == 'schedule' || inputs.send_notification)
        env:
          GH_TOKEN: ${{ secrets.VARIABLES_PAT }}
        run: gh variable set STATE_JSON --body "$(cat state.json)"

      - name: Upload runtime state artifact
        if: always() && hashFiles('state.json') != ''
        uses: actions/upload-artifact@v7
        with:
          name: runtime-state
          path: state.json
          if-no-files-found: ignore
